services:
  - type: web
    name: hos-logbook-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
      python manage.py createcachetable
    startCommand: gunicorn hos_project.wsgi --workers 2 --threads 2 --timeout 60 --bind 0.0.0.0:$PORT
    healthCheckPath: /healthz
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: ALLOWED_HOSTS
        value: hos-logbook-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://frontend-mu-five-51.vercel.app,https://hos-logbook.vercel.app
      - key: ROUTING_USE_FIXTURES
        value: "1"
      - key: ORS_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
